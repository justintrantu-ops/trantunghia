<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hommage à Monsieur TRÂN Tú Nghĩa</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; 
            background-color: #f8f9fa;
            font-family: 'Georgia', serif;
        }

        /* Conteneur principal avec l'image de fond */
        .video-placeholder {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100% - 180px); 
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url('https://tally.so/r/VLZJXa');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .video-placeholder:hover {
            opacity: 0.9;
        }

        /* Bouton Play central */
        .play-button {
            width: 90px;
            height: 90px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            transition: transform 0.3s;
        }

        .video-placeholder:hover .play-button {
            transform: scale(1.1);
            background: #ffffff;
        }

        .play-triangle {
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 20px 0 20px 35px;
            border-color: transparent transparent transparent #2c3e50;
            margin-left: 5px;
        }

        /* Texte indicatif */
        .play-text {
            position: absolute;
            bottom: 40px;
            color: white;
            font-size: 1.5em;
            font-style: italic;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        .footer-nav {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 180px; 
            background: rgba(255, 255, 255, 0.95); 
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
            border-top: 0.5px solid rgba(155, 89, 182, 0.2);
            z-index: 10;
        }

        .nav-link {
            text-decoration: none;
            color: #2c3e50;
            font-style: italic;
            font-weight: bold;
            font-size: 1.8em;
            padding: 20px 35px;
            border: 1.5px solid rgba(44, 62, 80, 0.2);
            border-radius: 12px;
            margin: 0 15px;
            background: white;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            color: #9b59b6;
            border-color: #9b59b6;
            transform: translateY(-2px);
        }

        @media (max-width: 600px) {
            .footer-nav { flex-direction: column; height: auto; padding: 15px 0; }
            .video-placeholder { height: calc(100% - 220px); }
            .nav-link { font-size: 1.1em; width: 85%; margin: 5px 0; }
        }
    </style>
</head>
<body>

    <a href="https://www.youtube.com/watch?v=MPtwM1S4HfE" target="_blank" class="video-placeholder">
        <div class="play-button">
            <div class="play-triangle"></div>
        </div>
        <div class="play-text">Cliquez pour regarder l'hommage vidéo à Monsieur Tran Tu Nghia</div>
    </a>

    <nav class="footer-nav">
        <a href="https://tally.so/r/VLZJXa" target="_blank" class="nav-link">Écrire dans le livre d'or</a>
        <a href="livre_dor.html" class="nav-link">Voir les messages d'hommage - Réservé à la famille</a>
    </nav>

</body>
</html>
