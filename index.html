<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hommage à Monsieur TRÂN Tú Nghĩa</title>
    <style>
        /* Supprime les marges par défaut */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; 
            background-color: #ffffff;
            font-family: 'Georgia', serif;
        }

        /* Conteneur de l'image de fond rendu cliquable */
        .fullscreen-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Utilisation du nom de fichier spécifié */
            background-image: url('Photo Faire-part décès.png');
            background-size: contain; 
            background-position: center;
            background-repeat: no-repeat;
            /* Ajout du curseur main pour indiquer que c'est cliquable */
            cursor: pointer;
            display: block;
        }

        /* Barre de navigation en bas */
        .footer-nav {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.9); 
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 0; /* Encore un peu plus d'espace pour les très grands textes */
            backdrop-filter: blur(8px);
            border-top: 0.5px solid rgba(155, 89, 182, 0.2);
            box-shadow: 0 -5px 10px rgba(0,0,0,0.08);
        }

        /* Style des boutons (Texte et hauteur agrandis) */
        .nav-link {
            text-decoration: none;
            color: #2c3e50;
            font-style: italic;
            font-weight: bold; /* Ajout d'un poids pour plus de visibilité */
            font-size: 2 em;   /* Taille des caractères augmentée significativement */
            transition: all 0.3s ease;
            padding: 25px 40px; /* Padding généreux pour la hauteur */
            border: 1.5px solid rgba(44, 62, 80, 0.2); /* Bordure légèrement plus épaisse */
            border-radius: 12px;
            margin: 0 20px;
            background: rgba(255, 255, 255, 0.6);
            display: inline-block;
            text-align: center;
        }
        .nav-link:hover {
            color: #9b59b6;
            transform: translateY(-1px);
        }

        /* Séparateur visuel */
        .separator {
            color: #ccc;
            user-select: none;
        }

        /* Adaptation mobile */
        @media (max-width: 600px) {
            .footer-nav {
                flex-direction: column;
                gap: 15px;
                padding: 15px 0;
            }
            .separator {
                display: none;
            }
        }
    </style>
</head>
<body>

    <a href="https://tally.so/r/VLZJXa" target="_blank" aria-label="Écrire dans le livre d'or">
        <div class="fullscreen-bg"></div>
    </a>

    <nav class="footer-nav">
        <a href="https://tally.so/r/VLZJXa" target="_blank" class="nav-link">Écrire dans le livre d'or</a>
        <span class="separator">|</span>
        <a href="livre_dor.html" class="nav-link">Voir les messages d'hommage</a>
    </nav>

</body>
</html>
