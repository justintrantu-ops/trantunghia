<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hommage à Monsieur TRÂN Tú Nghĩa</title>
    <style>
        /* Supprime les marges par défaut */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; 
            background-color: #ffffff;
            font-family: 'Georgia', serif;
        }

        /* Conteneur de l'image de fond rendu cliquable */
        .fullscreen-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            /* Ajustement ici : On réduit la hauteur pour laisser place à la barre du bas */
            height: calc(100% - 180px); 
            background-image: url('Photo Faire-part décès.png');
            background-size: contain; 
            background-position: center;
            background-repeat: no-repeat;
            cursor: pointer;
            display: block;
        }

        /* Barre de navigation en bas */
        .footer-nav {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 180px; /* On fixe la hauteur pour correspondre au calcul de l'image */
            background: rgba(255, 255, 255, 0.9); 
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
            border-top: 0.5px solid rgba(155, 89, 182, 0.2);
            box-shadow: 0 -5px 10px rgba(0,0,0,0.08);
        }

        /* Style des boutons */
        .nav-link {
            text-decoration: none;
            color: #2c3e50;
            font-style: italic;
            font-weight: bold;
            font-size: 2em;
            transition: all 0.3s ease;
            padding: 25px 40px;
            border: 1.5px solid rgba(44, 62, 80, 0.2);
            border-radius: 12px;
            margin: 0 20px;
            background: rgba(255, 255, 255, 0.6);
            display: inline-block;
            text-align: center;
        }

        .nav-link:hover {
            color: #9b59b6;
            background: #ffffff;
            border-color: #9b59b6;
            transform: translateY(-2px);
        }

        .separator {
            color: #ccc;
            user-select: none;
            font-size: 2em;
        }

        /* Adaptation mobile */
        @media (max-width: 600px) {
            .footer-nav {
                flex-direction: column;
                height: auto; /* Hauteur auto sur mobile car les boutons s'empilent */
                padding: 20px 0;
            }
            .fullscreen-bg {
                /* On réduit un peu plus sur mobile si nécessaire */
                height: calc(100% - 220px);
            }
            .nav-link {
                font-size: 1.2em;
                padding: 15px 25px;
                margin: 5px 0;
                width: 80%;
            }
            .separator {
                display: none;
            }
        }
    </style>
</head>
<body>

    <a href="https://tally.so/r/VLZJXa" target="_blank" aria-label="Écrire dans le livre d'or">
        <div class="fullscreen-bg"></div>
    </a>

    <nav class="footer-nav">
        <a href="https://tally.so/r/VLZJXa" target="_blank" class="nav-link">Écrire dans le livre d'or</a>
        <span class="separator">|</span>
        <a href="livre_dor.html" class="nav-link">Voir les messages d'hommage</a>
    </nav>

</body>
</html>
